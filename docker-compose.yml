services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workflow_ai_dashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d workflow_ai_dashboard"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    image: node:20-bookworm-slim
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: workflow_ai_dashboard
    volumes:
      - ./:/app
      - api_node_modules:/app/node_modules
    command: sh -c "npm ci && npm --workspace apps/api run start:dev"
    ports:
      - "3001:3001"

  web:
    image: node:20-bookworm-slim
    working_dir: /app
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    volumes:
      - ./:/app
      - web_node_modules:/app/node_modules
    command: sh -c "npm ci && npm --workspace apps/web run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  api_node_modules:
  web_node_modules:
