services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workflow_ai_dashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d workflow_ai_dashboard"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    image: node:20-bookworm-slim
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: workflow_ai_dashboard
    volumes:
      - ./:/app
      - api_node_modules:/app/node_modules
    command: sh -c "npm ci && npm --workspace apps/api run build && npm --workspace apps/api run start:prod"
    ports:
      - "${API_PORT:-3001}:3001"

  web:
    image: node:20-bookworm-slim
    working_dir: /app
    depends_on:
      - api
    environment:
      # Browser-executed code must be able to reach the API from the same host
      # you use to open the web UI (e.g. localhost vs a WSL/Docker/VM IP).
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      # Server-side rendering inside the web container must reach the API over the
      # Docker network (localhost inside the container is not the API container).
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:3001}
      # Next.js dev server safety setting for non-localhost access.
      NEXT_ALLOWED_DEV_ORIGINS: ${NEXT_ALLOWED_DEV_ORIGINS:-localhost,127.0.0.1}
    volumes:
      - ./:/app
      - web_node_modules:/app/node_modules
    command: sh -c "npm ci && npm --workspace apps/web run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  postgres_data:
  api_node_modules:
  web_node_modules:
